<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="spine-player.css">
<title>BD2 互动</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#0f0f16;color:#e8e8f2;font-family:system-ui,"Microsoft YaHei",sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh}
  #bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px 10px;background:#1b1b27;border-bottom:1px solid #2e2e42;font-size:13px}
  #scene{flex:1;min-width:150px;max-width:100%;padding:8px;background:#242435;color:#e8e8f2;border:1px solid #2e2e42;border-radius:8px;font-size:14px}
  #groups{display:flex;gap:5px;flex-wrap:wrap}
  #groups button{width:30px;height:30px;border-radius:7px;border:1px solid #2e2e42;background:transparent;color:#9a9ab0;font-size:13px}
  #groups button.on{background:#7b5cff;color:#fff;border-color:#7b5cff}
  .tg{display:flex;align-items:center;gap:4px;color:#9a9ab0}
  #stage{flex:1;position:relative;overflow:hidden;touch-action:none}
  #player{position:absolute;inset:0}
  #overlay{position:absolute;inset:0;pointer-events:none}
  #last{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.6);padding:6px 12px;border-radius:8px;color:#ffcf6b;font-size:14px;min-height:16px}
  #hud{position:absolute;left:10px;top:10px;background:rgba(0,0,0,.5);padding:5px 10px;border-radius:7px;color:#8a8aa2;font-size:12px}
</style></head><body>
<div id="app">
  <div id="bar">
    <select id="scene"></select>
    <span id="groups"></span>
    <label class="tg"><input type="checkbox" id="showzones" checked>区</label>
    <label class="tg"><input type="checkbox" id="dragmode">拖拽渐进</label>
    <button id="reset" style="padding:5px 10px;border-radius:7px;border:1px solid #2e2e42;background:transparent;color:#9a9ab0;font-size:12px">复位</button>
    <button id="colorbtn" style="display:none;padding:5px 10px;border-radius:7px;border:1px solid #7b5cff;background:transparent;color:#b9a6ff;font-size:12px">配色</button>
  </div>
  <div id="stage">
    <div id="player"></div><canvas id="overlay"></canvas>
    <div id="hud">选场景后点立绘不同部位</div><div id="last"></div>
  </div>
</div>
<script src="spine-player.js"></script>
<script>
const $=s=>document.querySelector(s);
let player, skeleton, state, config=[], scenes=[], cur=null, curGroup=1, showZones=true, dragMode=false, manualCam=null, boneNames=[], userZoom=1, userPanX=0, userPanY=0, pinch=null, listenersReady=false, clickCounts={}, revealed=null, revealTimer=null, hideUntilRevealed=new Set(), skinVariantCache={}, colorVariants=[], colorIdx=0, curIdle="idle1";

fetch('manifest.json').then(r=>r.json()).then(m=>{
  scenes=m;
  $("#scene").innerHTML=m.map(s=>`<option value="${s.n}">${s.char} · ${s.costume}</option>`).join('');
  $("#scene").onchange=()=>loadScene(+$("#scene").value);
  loadScene(m[0].n);
});
$("#showzones").onchange=e=>showZones=e.target.checked;
$("#dragmode").onchange=e=>dragMode=e.target.checked;

function loadScene(n){
  cur=scenes.find(s=>s.n===n); if(!cur) return;
  $("#hud").textContent="加载中…"; $("#last").textContent="";
  manualCam=null; curGroup=1; userZoom=1; userPanX=0; userPanY=0; pinch=null; clickCounts={}; revealed=null; clearTimeout(revealTimer); colorIdx=0; skinVariantCache={}; colorVariants=[];
  if(player){ try{player.dispose();}catch(e){} player=null; }
  $("#player").innerHTML="";
  fetch(cur.config).then(r=>r.json()).then(c=>{ config=c; makePlayer(); });
}
function makePlayer(){
  player=new spine.SpinePlayer("player",{
    skelUrl:cur.skel, atlasUrl:cur.atlas, premultipliedAlpha:false, alpha:false,
    backgroundColor:"#12121a", showControls:false,
    success:onReady, update:onUpdate, error:(p,m)=>{ $("#hud").textContent="加载失败:"+m; }
  });
}
function onUpdate(){
  if(!manualCam||!player||!player.sceneRenderer) return;
  const cam=player.sceneRenderer.camera, vw=cam.viewportWidth||1, vh=cam.viewportHeight||1;
  cam.zoom=Math.max(manualCam.w/vw, manualCam.h/vh)*1.12/userZoom;   // 双指捏合改 userZoom(>1 = 放大)
  cam.position.x=manualCam.cx+userPanX; cam.position.y=manualCam.cy+userPanY; cam.position.z=0; cam.update();
}
function resetView(){ userZoom=1; userPanX=0; userPanY=0; }
// 事件只装一次(否则每次切场景都叠一层,会导致一点触发多次反应)
function ensureListeners(){
  if(listenersReady) return; listenersReady=true;
  const stage=$("#stage");
  // 拦 spine-player 的"点画面=暂停";单指点 canvas → 触发反应
  for(const ev of ["pointerdown","pointerup","pointercancel","pointermove","mousedown","mouseup","click"]){
    stage.addEventListener(ev, e=>{
      if(e.target && e.target.tagName==="CANVAS"){ e.stopPropagation();
        if(pinch) return;
        if(ev==="pointerdown") onPress(e);
        else if(ev==="pointerup"||ev==="pointercancel") onRelease(e); }
    }, true);
  }
  const D=t=>Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
  const M=t=>({x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2});
  // 屏幕点 → 世界坐标(按当前相机)
  const s2w=(cx,cy)=>{ const cam=player.sceneRenderer.camera,cv=player.canvas,r=cv.getBoundingClientRect();
    const wpp=cam.zoom*(cam.viewportWidth/cv.clientWidth), ox=(cx-r.left)-cv.clientWidth/2, oy=(cy-r.top)-cv.clientHeight/2;
    return {x:cam.position.x+ox*wpp, y:cam.position.y-oy*wpp}; };
  // 缩放到 nz,并让世界点 wp 保持落在屏幕点(cx,cy)下 → 绕手指/光标锚定缩放(而非绕画面中心,否则内容从手指下溜走)
  const anchorZoom=(nz,wp,cx,cy)=>{ if(!manualCam) return; userZoom=Math.min(6,Math.max(0.5,nz));
    const cam=player.sceneRenderer.camera,cv=player.canvas,r=cv.getBoundingClientRect();
    const ncz=Math.max(manualCam.w/cam.viewportWidth,manualCam.h/cam.viewportHeight)*1.12/userZoom;
    const wpp=ncz*(cam.viewportWidth/cv.clientWidth), ox=(cx-r.left)-cv.clientWidth/2, oy=(cy-r.top)-cv.clientHeight/2;
    userPanX=(wp.x-ox*wpp)-manualCam.cx; userPanY=(wp.y+oy*wpp)-manualCam.cy; };
  stage.addEventListener('touchstart', e=>{
    if(e.touches.length===2 && player && manualCam){ e.preventDefault(); const m=M(e.touches);
      pinch={d:D(e.touches), z:userZoom, wp:s2w(m.x,m.y)}; }   // 记住捏合中点的世界坐标
  }, {passive:false});
  stage.addEventListener('touchmove', e=>{
    if(pinch && e.touches.length===2 && player){ e.preventDefault(); const m=M(e.touches);
      anchorZoom(pinch.z*D(e.touches)/pinch.d, pinch.wp, m.x, m.y); }   // 绕捏合点缩放 + 双指拖动跟手
  }, {passive:false});
  stage.addEventListener('touchend', e=>{ if(e.touches.length<2) pinch=null; });
  stage.addEventListener('wheel', e=>{ e.preventDefault();   // 桌面滚轮:绕光标缩放
    if(player&&manualCam) anchorZoom(userZoom*(e.deltaY<0?1.1:0.9), s2w(e.clientX,e.clientY), e.clientX, e.clientY); }, {passive:false});
  const rb=$("#reset"); if(rb) rb.onclick=resetView;
}
// 一组皮肤(可选是否含 default)在 setup 姿势下的包围盒(剔除 >15000px 离群件)
function bboxOfSkins(names, withDefault){
  const data=skeleton.data, sk=new spine.Skin('__x');
  if(withDefault){ const def=data.findSkin('default'); if(def) sk.addSkin(def); }
  for(const nm of names){ const s=data.findSkin(nm); if(s) sk.addSkin(s); }
  skeleton.setSkin(sk); skeleton.setSlotsToSetupPose(); skeleton.setToSetupPose(); skeleton.updateWorldTransform();
  const wv=new Array(8192); let X0=1e18,Y0=1e18,X1=-1e18,Y1=-1e18;
  for(const slot of skeleton.slots){ const at=slot.getAttachment&&slot.getAttachment(); if(!at) continue; let n=0;
    if(at instanceof spine.RegionAttachment){at.computeWorldVertices(slot,wv,0,2);n=8;}
    else if(at instanceof spine.MeshAttachment){at.computeWorldVertices(slot,0,at.worldVerticesLength,wv,0,2);n=at.worldVerticesLength;}
    else continue;
    for(let i=0;i<n;i+=2){const x=wv[i],y=wv[i+1];if(Math.abs(x)>15000||Math.abs(y)>15000)continue;if(x<X0)X0=x;if(x>X1)X1=x;if(y<Y0)Y0=y;if(y>Y1)Y1=y;}}
  return X0<=X1?[X0,Y0,X1,Y1]:null;
}
function bArea(b){ return b?(b[2]-b[0])*(b[3]-b[1]):0; }
function bboxIoU(a,b){ if(!a||!b) return 0;
  const ix=Math.max(0,Math.min(a[2],b[2])-Math.max(a[0],b[0])), iy=Math.max(0,Math.min(a[3],b[3])-Math.max(a[1],b[1]));
  const inter=ix*iy; return inter/Math.max(1,bArea(a)+bArea(b)-inter);
}
// 判定"双配色变体":≥2 个皮肤各自(不含 default)都几乎覆盖整个角色、且相互重叠(如 Angelica 正常色 vs 霓虹色两套全身)。
// 关键:必须算皮肤"自己"的附件,不能算 default+皮肤——否则 default 里若含身体(如 Justia)会把每个皮肤 bbox 都撑成全身而误判。
function skinSlotCount(skinName){   // 该皮肤自己有附件的插槽数(不含 default)
  const s=skeleton.data.findSkin(skinName); if(!s) return 0; const A=s.attachments; let c=0;
  if(Array.isArray(A)) for(let i=0;i<A.length;i++){ if(A[i]&&Object.keys(A[i]).length) c++; }
  return c;
}
function detectColorVariants(matched){
  if(matched.length<2) return [];
  // 每个变体本身要覆盖足够多部件(全身版,≥50 件)——排除"稀疏/道具/附加"皮肤(如 Justia 的 18/20 件,那种要叠加才完整)
  const big=matched.filter(s=>skinSlotCount(s.name)>=50);
  if(big.length<2) return [];
  const b0=bboxOfSkins([big[0].name],false), b1=bboxOfSkins([big[1].name],false);
  if(bboxIoU(b0,b1)>0.6) return big.map(s=>s.name);   // 各自占同一视觉空间 → 配色变体,只显示选中的一套
  return [];
}
function combineSkin(anim){
  colorVariants=[];   // 先清空,避免残留上个场景/组的配色变体
  const data=skeleton.data, base=(anim.match(/^[a-zA-Z]+[0-9]*/)||[anim])[0];
  const named=data.skins.filter(s=>s.name!=='default'); if(!named.length) return;
  let matched=named.filter(s=>s.name.indexOf(base)===0);
  const prefixMatched=matched.length>0;   // 只有动画名真前缀匹配到具名皮肤才可能是"配色变体";回退到全部皮肤的情况一律全叠(避免误判 Liberta 的 skin1_off/skin2_on)
  if(!matched.length) matched=named;
  if(prefixMatched){
    if(!(base in skinVariantCache)) skinVariantCache[base]=detectColorVariants(matched);
    colorVariants=skinVariantCache[base];
  }
  const sk=new spine.Skin('__c'); const def=data.findSkin('default'); if(def) sk.addSkin(def);
  if(colorVariants.length){ const s=data.findSkin(colorVariants[colorIdx%colorVariants.length]); if(s) sk.addSkin(s); }   // 配色变体:只用选中的一套
  else for(const s of matched) sk.addSkin(s);                                                                             // 互补分层:全叠
  skeleton.setSkin(sk); skeleton.setSlotsToSetupPose();
}
function robustViewport(animName){
  const data=skeleton.data, anim=data.findAnimation(animName), dur=anim?anim.duration:0;
  const wv=new Array(8192); let X0=1e18,Y0=1e18,X1=-1e18,Y1=-1e18;
  const times=dur>0?[0,.25,.5,.75].map(f=>f*dur):[0];
  for(const t of times){
    skeleton.setToSetupPose(); state.clearTracks(); state.setAnimation(0,animName,false);
    state.tracks[0].trackTime=t; state.apply(skeleton); skeleton.updateWorldTransform();
    for(const slot of skeleton.slots){
      const at=slot.getAttachment&&slot.getAttachment(); if(!at) continue; let n=0;
      if(at instanceof spine.RegionAttachment){at.computeWorldVertices(slot,wv,0,2);n=8;}
      else if(at instanceof spine.MeshAttachment){at.computeWorldVertices(slot,0,at.worldVerticesLength,wv,0,2);n=at.worldVerticesLength;}
      else continue;
      let x0=1e18,y0=1e18,x1=-1e18,y1=-1e18;
      for(let i=0;i<n;i+=2){const x=wv[i],y=wv[i+1];if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;}
      const w=x1-x0,h=y1-y0,cx=(x0+x1)/2,cy=(y0+y1)/2;
      if(w>15000||h>15000||Math.abs(cx)>20000||Math.abs(cy)>20000) continue;
      X0=Math.min(X0,x0);X1=Math.max(X1,x1);Y0=Math.min(Y0,y0);Y1=Math.max(Y1,y1);
    }
  }
  return (X0<=X1)?{x:X0,y:Y0,w:X1-X0,h:Y1-Y0}:null;
}
function setGroup(g){
  curGroup=g; revealed=null; const data=skeleton.data, idle="idle"+g;
  const useIdle=data.findAnimation(idle)?idle:(data.findAnimation("idle1")?"idle1":data.animations[0].name);
  combineSkin(useIdle); curIdle=useIdle;
  const cb=$("#colorbtn"); if(cb) cb.style.display=colorVariants.length?'':'none';   // 有配色变体才显示「配色」按钮
  const vp=robustViewport(useIdle); if(vp) manualCam={cx:vp.x+vp.w/2,cy:vp.y+vp.h/2,w:vp.w,h:vp.h};
  state.clearTracks(); skeleton.setToSetupPose(); state.setAnimation(0,useIdle,true);
  document.querySelectorAll('#groups button').forEach(b=>b.classList.toggle('on',+b.dataset.g===g));
}
function onReady(p){
  skeleton=p.skeleton; state=p.animationState; boneNames=skeleton.data.bones.map(b=>b.name);
  // 把配置的 mix{g}_{id} 解析成真实动画名(带 _1/_2 后缀);没有对应动画的区域标记为不可用
  const _anims=skeleton.data.animations;
  const resolve=nm=>{ if(!nm) return null; const a=_anims.find(x=>x.name===nm)||_anims.find(x=>x.name===nm+"_1")||_anims.find(x=>x.name.startsWith(nm+"_")); return a?a.name:null; };
  for(const e of config){   // 解析真实动画名:_plays=权威列表(点多次/随机切不同的);另有拖拽的 loop/success/fail
    e._anim=resolve(e.anim); e._loop=resolve(e.loop); e._success=resolve(e.success); e._fail=resolve(e.fail);
    const src=(e.plays&&e.plays.length)?e.plays:[e.anim];
    e._plays=[...new Set(src.map(resolve).filter(Boolean))];
    if(!e._plays.length && e._anim) e._plays=[e._anim];
  }
  // "解锁前隐藏"的点集:凡是被某个触发点 reveals 的,默认藏起来,点了触发点才启用(还原游戏的隐藏点机制)
  hideUntilRevealed=new Set();
  for(const e of config) if(e.reveals) for(const gi of e.reveals) hideUntilRevealed.add(gi);
  const groups=[...new Set(config.filter(c=>c._plays&&c._plays.length).map(c=>c.group))].sort((a,b)=>a-b);
  $("#groups").innerHTML=groups.map(g=>`<button data-g="${g}" class="${g===1?'on':''}">${g}</button>`).join('');
  $("#groups").onclick=e=>{const b=e.target.closest('button'); if(b) setGroup(+b.dataset.g);};
  $("#colorbtn").onclick=()=>{ if(!colorVariants.length) return; colorIdx++; combineSkin(curIdle); state.setAnimation(0,curIdle,true);
    $("#last").textContent=`配色 ${(colorIdx%colorVariants.length)+1}/${colorVariants.length}`; };   // 切换正常色/霓虹色
  setGroup(1);
  $("#hud").textContent="点立绘不同部位触发反应";
  p.canvas.style.cursor='pointer';
  ensureListeners();   // 点击拦截 + 双指缩放/拖动 + 滚轮 + 复位(只装一次)
  try{ if(player.play) player.play(); }catch(_){}   // spine-player 默认加载后暂停,主动开播,否则是静止图
  requestAnimationFrame(loop);
}
function findPointBone(g,id,kind){
  let b=skeleton.findBone(`point${g}_${id}_${kind}`); if(b) return b;
  const pfx=`point${g}_${id}`, cands=boneNames.filter(n=>n===pfx||n.startsWith(pfx+"_"));
  const pick=cands.find(n=>n.includes(kind))||cands.find(n=>n.includes("follow"))||cands[0];
  return pick?skeleton.findBone(pick):null;
}
function zoneWorld(e){ const b=findPointBone(e.group,e.id,e.kind); if(!b) return null;
  return {x:b.worldX,y:b.worldY,w:(e.rect&&e.rect.w)||150,h:(e.rect&&e.rect.h)||150}; }
function animated(e){ return e._plays && e._plays.length; }
function isOnScreen(e){ const b=findPointBone(e.group,e.id,e.kind); if(!b||!player) return false;
  const cam=player.sceneRenderer.camera,pc=player.canvas,s=cam.worldToScreen(new spine.Vector3(b.worldX,b.worldY,0),pc.clientWidth,pc.clientHeight);
  return isFinite(s.x)&&s.x>=0&&s.x<=pc.clientWidth&&s.y>=0&&s.y<=pc.clientHeight; }
function curEntries(){
  if(revealed){ const r=config.filter(e=>animated(e)&&revealed.has(e.group+"_"+e.id)); if(r.length) return r; }   // 解锁后:只显示被解锁的隐藏点
  const vis=e=>animated(e)&&e.group===curGroup&&!hideUntilRevealed.has(e.group+"_"+e.id);
  let es=config.filter(e=>vis(e)&&(dragMode?isDragZone(e):!isDragZone(e)));   // 默认:点触点(排除未解锁的隐藏点)
  if(!es.length) es=config.filter(vis);   // 该组在当前模式下没点(如只有渐进拖拽)→ 显示该组全部,避免空组
  return es;
}
function nearestZone(ev){
  const cv=player.canvas,r=cv.getBoundingClientRect(),cam=player.sceneRenderer.camera,W=cv.clientWidth,H=cv.clientHeight;
  const px=ev.clientX-r.left, py=ev.clientY-r.top;
  let best=null,bd=Infinity;
  for(const e of curEntries()){ const z=zoneWorld(e); if(!z) continue;
    const c=cam.worldToScreen(new spine.Vector3(z.x,z.y,0),W,H); if(!isFinite(c.x)) continue;   // 在屏幕空间比(和画框同一变换),点哪命中哪
    const d=(px-c.x)*(px-c.x)+(py-c.y)*(py-c.y); if(d<bd){bd=d;best=e;} }
  return best;
}
// 点触:点一下播 mix 反应。拖拽/长按:按住时循环播 loop(动画随按住持续渐进),松手够 hold 秒→success(完成,如脱丝袜),太早松→fail
let heldZone=null, heldStart=0, stackKey=null, stackIdx=0;
function isDragZone(e){ return !!(e._loop || e._success); }   // 只有真·渐进拖拽(有 loop/success,如 dating18)才走"按住"流程;其余走 fire() 点触循环
function idleName(g){ const n="idle"+g; return skeleton.data.findAnimation(n)?n:"idle1"; }
// 多个交互点常精确重叠在同一处(如 dating14 有 10 个);连点这一堆 → 轮流触发,让重叠的点都能点到
function pickZone(ev){
  const cv=player.canvas,r=cv.getBoundingClientRect(),cam=player.sceneRenderer.camera,W=cv.clientWidth,H=cv.clientHeight;
  const px=ev.clientX-r.left, py=ev.clientY-r.top, arr=[];
  for(const e of curEntries()){ const z=zoneWorld(e); if(!z) continue;
    const c=cam.worldToScreen(new spine.Vector3(z.x,z.y,0),W,H); if(!isFinite(c.x)) continue;
    arr.push({e,d:(px-c.x)*(px-c.x)+(py-c.y)*(py-c.y)}); }
  if(!arr.length) return null; arr.sort((a,b)=>a.d-b.d);
  const near=arr.filter(a=>a.d<=arr[0].d+400);   // 最近点 + 其 ~20px 内的算作同一堆重叠点
  if(near.length<=1){ stackKey=null; return arr[0].e; }
  const key=near.map(a=>a.e.group+"_"+a.e.id).sort().join(","); if(key!==stackKey){ stackKey=key; stackIdx=0; }
  const e=near[stackIdx%near.length].e; stackIdx++; return e;   // 同一堆:连点轮流
}
function onPress(ev){ const e=pickZone(ev); if(!e) return; if(isDragZone(e)) startHold(e); else fire(e); }
function startHold(e){
  heldZone=e; heldStart=performance.now();
  try{ if(player.paused&&player.play) player.play(); }catch(_){}
  state.setAnimation(0,idleName(e.group),true);
  const h=e._loop||e._anim; if(h) state.setAnimation(1,h,true);   // 按住=循环播,视觉上持续渐进
  $("#last").textContent=`⭯ 按住/拖动… ${h||''}`; window.__holding=true; window.__lastAnim=h||null;
}
function onRelease(){
  if(!heldZone) return; const e=heldZone; heldZone=null; window.__holding=false;
  const held=(performance.now()-heldStart)/1000, need=e.hold||0.45;
  const done=(a,tag)=>{ state.setAnimation(0,idleName(e.group),true); state.setAnimation(1,a,false); $("#last").textContent=tag; window.__lastAnim=a; };
  if(held>=need && e._success) done(e._success,`✔ ${e._success}`);
  else if(held<need && e._fail) done(e._fail,`✘ 松太早 · ${e._fail}`);
  else if(e._success) done(e._success,`✔ ${e._success}`);
  else { state.setAnimation(0,idleName(e.group),true); state.setEmptyAnimation(1,0.15); $("#last").textContent="(回到待机)"; }
}
function fire(e){
  const plays=(e._plays&&e._plays.length)?e._plays:(e._anim?[e._anim]:[]);
  if(!plays.length){ $("#last").textContent=`(无反应)`; window.__lastAnim=null; return; }
  const key=e.group+"_"+e.id+"_"+e.kind;
  let idx;
  if(e.rand){ idx=Math.floor(Math.random()*plays.length); }                                    // 随机播一个
  else { idx=(clickCounts[key]||0)%plays.length; clickCounts[key]=(clickCounts[key]||0)+1; }    // 同一处连点→循环切不同的
  const anim=plays[idx];
  try{ if(player.paused && player.play) player.play(); }catch(_){}
  state.setAnimation(0,idleName(e.group),true); state.setAnimation(1,anim,false);
  const tag=plays.length>1?` (${idx+1}/${plays.length}${e.rand?' 随机':''})`:"";
  $("#last").textContent=`▶ ${anim}${tag} · 组${e.group}`; window.__lastAnim=anim;
  if(e.reveals && e.reveals.length) triggerReveal(e);     // 点这里→解锁隐藏点(触发"事件",出现新互动)
  if(e.nextState) advanceState(e.group, anim);            // 交互结束→推进到下一状态
}
// 解锁隐藏点:临时只显示被解锁的那几个点(其余禁用),几秒后恢复
function triggerReveal(e){
  // 只启用画面内的被解锁点(画外的没法点);启用后进入"聚焦"—只这些可点,几秒后恢复(还原 disableAllAnotherPoint + durationTime)
  const ons=e.reveals.filter(gi=>{const p=gi.split('_'),t=config.find(x=>x.group==+p[0]&&x.id==+p[1]&&animated(x)); return t&&isOnScreen(t);});
  if(!ons.length){ $("#hud").textContent="✨ 触发隐藏点(在画面外,可缩小/拖动找)"; return; }
  revealed=new Set(ons);
  $("#hud").textContent=`✨ 解锁隐藏互动!点亮的金框(约 3 秒)`;
  clearTimeout(revealTimer);
  revealTimer=setTimeout(()=>{ revealed=null; $("#hud").textContent="点立绘不同部位触发反应"; }, 3500);
}
// 推进状态:该交互动画播完 → 切到下一个 group(不同状态有不同 idle + 互动)
function advanceState(from, anim){
  const gs=[...new Set(config.filter(animated).map(c=>c.group))].sort((a,b)=>a-b);
  const next=gs[gs.indexOf(from)+1]; if(next==null) return;
  const dur=(skeleton.data.findAnimation(anim)||{}).duration||1;
  setTimeout(()=>{ if(curGroup===from){ setGroup(next); $("#hud").textContent=`→ 进入状态 ${next}`;
    setTimeout(()=>{ if(!revealed) $("#hud").textContent="点立绘不同部位触发反应"; }, 1600); } }, dur*1000+150);
}
function loop(){
  const cv=$("#overlay"),st=$("#stage"); if(cv.width!==st.clientWidth) cv.width=st.clientWidth; if(cv.height!==st.clientHeight) cv.height=st.clientHeight;
  const ctx=cv.getContext('2d'); ctx.clearRect(0,0,cv.width,cv.height);
  if(showZones&&skeleton&&player){
    const cam=player.sceneRenderer.camera,pc=player.canvas,W=pc.clientWidth,H=pc.clientHeight;
    for(const e of curEntries()){ const z=zoneWorld(e); if(!z) continue;
      const c=cam.worldToScreen(new spine.Vector3(z.x,z.y,0),W,H); if(!isFinite(c.x)) continue;
      const c2=cam.worldToScreen(new spine.Vector3(z.x+z.w/2,z.y+z.h/2,0),W,H);
      const sw=Math.abs(c2.x-c.x)*2,sh=Math.abs(c2.y-c.y)*2;
      const hot=revealed&&revealed.has(e.group+"_"+e.id);   // 被解锁的隐藏点高亮金框
      ctx.strokeStyle=hot?'rgba(255,210,80,.98)':(dragMode?'rgba(255,160,60,.6)':'rgba(0,211,194,.5)');
      ctx.lineWidth=hot?2.5:1.3; ctx.strokeRect(c.x-sw/2,c.y-sh/2,sw,sh);
    }
  }
  requestAnimationFrame(loop);
}
</script></body></html>
